{% extends "base.html" %}

{% block content %}
<div class="container">
    <p> Bonjour:  {{ user.username }} </p>
    
    <h2>Liste des tickets</h2>
    {% if tickets %}
        <ul>
        {% for ticket in tickets %}
            <li>{{ ticket.title }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>Aucun ticket enregistré.</p>
    {% endif %}

    <!-- Liens utiles -->
    <div class="action-buttons-signup">
        <a href="{% url 'logout' %}">Se déconnecter</a>
        <a href="{% url 'newticket' %}">Créer un ticket</a>
        <a href="{% url 'newreview' %}">Créer une revue</a>
    </div>
</div>    

{% endblock %}
